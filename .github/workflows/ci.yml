name: ci-pr
on: [pull_request, workflow_dispatch]
jobs:
  format-check:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: init
        run: |
            sudo update-alternatives --remove-all clang-format
            sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 10
      - name: format code
        run: scripts/format_code.sh
      - name: check diff
        run: .github/format_check_diff.sh
  x64-linux-gcc:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: init
        run: |
            uname -m
            sudo apt update -yqq
            sudo apt install -yqq mesa-common-dev libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules xorg-dev
            sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 10
            sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 10
      - name: configure
        run: cmake -S . --preset=ninja-gcc -B build -DKVF_USE_FREETYPE=OFF
      - name: build debug
        run: cmake --build build --config=Debug -- -v
      - name: build release
        run: cmake --build build --config=Release -- -v
      - name: test debug
        run: cd build && ctest -V -C Debug
      - name: test release
        run: cd build && ctest -V -C Release
